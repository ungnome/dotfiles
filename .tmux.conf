###############################################################################
# My Configs
###############################################################################
set-option -ga terminal-overrides ",$TERM:Tc" # enable truecolor
set -g mouse on

# change leader to CTRL+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload tmux config with <leader>-r
bind r source-file ~/.tmux.conf

# Status bar on top
set -g status-position top
set-option -g allow-rename off

###############################################################################
# List of plugins
###############################################################################
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'
# set -g @plugin 'git@bitbucket.com:user/plugin'
set -g @plugin 'catppuccin/tmux'


###############################################################################
# Plugin Configs
###############################################################################
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_current_text "#W"
set -g @catppuccin_window_default_text "#W"
# set -g @catppuccin_window_default_background "#{thm_bg}
set -g @catppuccin_window_current_background "#{thm_gray}"

set -g @catppuccin_pane_border_style "fg=#{thm_fg}"
set -g @catppuccin_pane_active_border_style "fg=#{thm_fg}"

set -g @catppuccin_status_background "default"
set -g @catppuccin_status_modules_left "null"
set -g @catppuccin_status_modules_right "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator ""
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"


###############################################################################
# TPM
###############################################################################
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'


