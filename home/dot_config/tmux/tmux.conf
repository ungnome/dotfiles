set-option -ga terminal-overrides ",xterm-256color:Tc" # enable truecolor
set-option -g status-position top
set -g mouse on

# change leader to CTRL+a
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Reload tmux config with <leader>-r
bind r source-file ~/.config/tmux/tmux.conf

#######################################################################
### These are taken from https://github.com/tmux-plugins/tmux-sensible
#######################################################################
# Address vim mode switching delay (http://superuser.com/a/252717/65504)
set -s escape-time 0

# Increase scrollback buffer size from 2000 to 50000 lines
set -g history-limit 50000

# Increase tmux messages display duration from 750ms to 4s
set -g display-time 4000

# Refresh 'status-left' and 'status-right' more often, from every 15s to 5s
set -g status-interval 5

# Focus events enabled for terminals that support them
set -g focus-events on

# Super useful when using "grouped sessions" and multi-monitor setup
setw -g aggressive-resize on

###############################################################################
# Status Bar
###############################################################################

# Catppuccin (Mocha)
set -g @thm_bg "#1e1e2e"
set -g @thm_fg "#cdd6f4"
set -g @thm_cyan "#89dceb"
set -g @thm_black "#181825"
set -g @thm_gray "#313244"
set -g @thm_magenta "#cba6f7"
set -g @thm_pink "#f5c2e7"
set -g @thm_red "#f38ba8"
set -g @thm_green "#a6e3a1"
set -g @thm_yellow "#f9e2af"
set -g @thm_blue "#89b4fa"
set -g @thm_orange "#fab387"
set -g @thm_black4 "#585b70"


# separators for the left / window list
set -g @l_left_separator ""
set -g @l_right_separator ""

# separators for the right status
set -g @r_left_separator ""
set -g @r_right_separator ""

# icons
set -g @session_icon ""

# status
set -g status "on"
set -g status-bg "default"
set -g status-left-length 100
set -g status-right-length 100
set -g status-justify "left"


set -Fg 'status-format[1]' '#{status-format[0]}'
set -g 'status-format[1]' ''
set -g status 2

# messages
set -g message-style "fg=#{@thm_cyan},bg=#{@thm_gray},align=centre"
set -g message-command-style "fg=#{@thm_cyan},bg=#{@thm_gray},align=centre"

# panes
set -g pane-border-style "fg=#{@thm_gray}"
set -g pane-active-border-style "fg=#{@thm_blue}"

# status line
set -g status-left ""
set -g status-right "#[fg=#{@thm_green},bg=default,nobold,nounderscore,noitalics]#{?client_prefix,#[fg=#{@thm_red}],#[fg=#{@thm_green}]}#{@r_left_separator}#[fg=#{@thm_bg},bg=#{@thm_green}]#{?client_prefix,#[bg=#{@thm_red}],#[bg=#{@thm_green}]}#{@session_icon} #[fg=#{@thm_fg},bg=#{@thm_gray}] #S #[fg=#{@thm_gray},bg=default,nobold,nounderscore,noitalics]#{@r_right_separator} "
set -g window-status-format "#[fg=#{@thm_fg},bg=#{@thm_bg}] #W #[fg=#{@thm_bg},bg=#{@thm_fg}] #I#[fg=#{@thm_fg},bg=default]#{@l_right_separator} "
set -g window-status-current-format "#[fg=#{@thm_fg},bg=#{@thm_gray}] #W #[fg=#{@thm_bg},bg=#{@thm_magenta}] #I#[fg=#{@thm_magenta},bg=default,nobold,nounderscore,noitalics]#{@l_right_separator} "

set -g status-style bg=default

set -g mode-style "fg=#{@thm_pink} bg=#{@thm_black4} bold"
